<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #fff;
      color: #202124;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #e8f5e9;
      color: #2e7d32;
      font-weight: 500;
    }
    .badge.off {
      background: #fce4ec;
      color: #c62828;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #e8eaed;
    }
    .toggle-row label {
      font-size: 13px;
      font-weight: 500;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 20px;
      transition: .2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px; width: 16px;
      left: 2px; bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }
    .switch input:checked + .slider {
      background: #1a73e8;
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
    .info {
      font-size: 12px;
      color: #5f6368;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e8eaed;
      line-height: 1.5;
    }
    kbd {
      display: inline-block;
      padding: 1px 4px;
      font-size: 11px;
      background: #f1f3f4;
      border: 1px solid #dadce0;
      border-radius: 3px;
      font-family: monospace;
    }
    .footer {
      font-size: 11px;
      color: #9aa0a6;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Humaniser</h1>
    <span class="badge" id="statusBadge">ON</span>
  </div>

  <div class="toggle-row">
    <label for="toggle">Enabled</label>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="info">
    Click <strong>✎ Humanise</strong> in the Gmail compose toolbar to insert <strong>one</strong> common typo into your draft.
  </div>

  <div class="footer">v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
